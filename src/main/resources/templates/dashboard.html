<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Vinyl Encyclopedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header class="hero">
        <p class="hero-label">Protected Page</p>
        <h1>Welcome, <span th:text="${username}">user</span></h1>
        <p class="hero-text">
            Authentication works. Next we will build the real vinyl collection features here.
        </p>

        <div class="hero-actions">
            <a th:href="@{/}" class="btn btn-secondary">Home</a>

            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Logout</button>
            </form>
        </div>
    </header>
</div>
</body>
</html>
