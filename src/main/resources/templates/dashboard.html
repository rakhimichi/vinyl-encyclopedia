<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Dashboard - Vinyl Encyclopedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header class="hero">
        <p class="hero-label">Protected Page</p>
        <h1>Welcome, <span th:text="${username}">user</span></h1>
        <p class="hero-text">
            Your personal vinyl dashboard is ready. Add new records or open your full visual catalog.
        </p>

        <div class="hero-actions">
            <a th:href="@{/records/new(section='IN_MY_COLLECTION')}" class="btn btn-secondary">Add to My Collection</a>
            <a th:href="@{/records/new(section='WISHLIST')}" class="btn btn-secondary">Add to Wishlist</a>
            <a th:if="${isAdmin}" th:href="@{/admin}" class="btn btn-secondary">Admin Panel</a>

            <form th:action="@{/logout}" method="post" class="inline-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-primary">Logout</button>
            </form>
        </div>
    </header>

    <section class="info-grid">
        <div class="card">
            <h2>Total Records</h2>
            <p th:text="${stats.totalRecords}">0</p>
            <a th:href="@{/records}" class="card-link">Open records catalog</a>
        </div>

        <div class="card">
            <h2>My Collection</h2>
            <p th:text="${stats.inMyCollectionRecords}">0</p>
            <a th:href="@{/records#collection-section}" class="card-link">Open my collection section</a>
        </div>

        <meta name="viewport" content="width=device-width, initial-scale=1.0">

        <div class="card">
            <h2>Wishlist</h2>
            <p th:text="${stats.wishlistRecords}">0</p>
            <a th:href="@{/records#wishlist-section}" class="card-link">Open wishlist section</a>
        </div>
    </section>
</div>
</body>
</html>
