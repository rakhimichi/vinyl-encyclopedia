<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Record - Vinyl Encyclopedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header class="hero">
        <p class="hero-label">Edit Vinyl Record</p>
        <h1>Edit Record</h1>
        <p class="hero-text">
            Update the information for an existing record in your catalog.
        </p>

        <div class="hero-actions">
            <a th:href="@{/dashboard}" class="btn btn-secondary">Dashboard</a>
            <a th:href="@{/records}" class="btn btn-secondary">Open Catalog</a>
            <a th:href="@{/records/new(section='IN_MY_COLLECTION')}" class="btn btn-secondary">Add Record</a>
            <a th:href="@{/records/new(section='WISHLIST')}" class="btn btn-secondary">Add to Wishlist</a>
        </div>
    </header>

    <section class="single-form-section">
        <div class="form-card wide-card">
            <h2>Edit Record</h2>

            <form th:action="@{'/records/' + ${recordId} + '/edit'}" th:object="${recordForm}" method="post" class="record-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">

                <div class="form-group">
                    <label for="artist">Artist *</label>
                    <input id="artist" type="text" th:field="*{artist}">
                    <p class="field-error" th:if="${#fields.hasErrors('artist')}" th:errors="*{artist}"></p>
                </div>

                <div class="form-group">
                    <label for="title">Album Title *</label>
                    <input id="title" type="text" th:field="*{title}">
                    <p class="field-error" th:if="${#fields.hasErrors('title')}" th:errors="*{title}"></p>
                </div>

                <div class="form-group">
                    <label for="coverImagePath">Cover Image URL *</label>
                    <input id="coverImagePath" type="text" th:field="*{coverImagePath}">
                    <p class="field-error" th:if="${#fields.hasErrors('coverImagePath')}" th:errors="*{coverImagePath}"></p>
                </div>

                <div class="form-group">
                    <label for="genre">Genre</label>
                    <input id="genre" type="text" th:field="*{genre}">
                    <p class="field-error" th:if="${#fields.hasErrors('genre')}" th:errors="*{genre}"></p>
                </div>

                <div class="form-group">
                    <label for="releaseYear">Release Year</label>
                    <input id="releaseYear" type="number" th:field="*{releaseYear}">
                    <p class="field-error" th:if="${#fields.hasErrors('releaseYear')}" th:errors="*{releaseYear}"></p>
                </div>

                <div class="form-group">
                    <label for="labelName">Label</label>
                    <input id="labelName" type="text" th:field="*{labelName}">
                    <p class="field-error" th:if="${#fields.hasErrors('labelName')}" th:errors="*{labelName}"></p>
                </div>

                <div class="form-group">
                    <label for="collectionSection">Section</label>
                    <select id="collectionSection" th:field="*{collectionSection}">
                        <option value="">Select section</option>
                        <option th:each="section : ${collectionSections}"
                                th:value="${section}"
                                th:text="${section == T(com.kirill.vinylencyclopedia.domain.CollectionSection).IN_MY_COLLECTION ? 'In My Collection' : 'Wishlist'}">
                        </option>
                    </select>
                    <p class="field-error" th:if="${#fields.hasErrors('collectionSection')}" th:errors="*{collectionSection}"></p>
                </div>

                <div class="form-group">
                    <label for="vinylFormat">Vinyl Format</label>
                    <select id="vinylFormat" th:field="*{vinylFormat}">
                        <option value="">Select format</option>
                        <option th:each="format : ${vinylFormats}"
                                th:value="${format}"
                                th:text="${format}">
                        </option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="notes">Notes</label>
                    <textarea id="notes" th:field="*{notes}" rows="4"></textarea>
                    <p class="field-error" th:if="${#fields.hasErrors('notes')}" th:errors="*{notes}"></p>
                </div>

                <button type="submit" class="btn btn-primary full-width">Update Record</button>
            </form>
        </div>
    </section>
</div>
</body>
</html>
