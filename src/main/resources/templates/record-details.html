<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Record Details - Vinyl Encyclopedia</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
<div class="page">
    <header class="hero">
        <p class="hero-label">Record Details</p>
        <h1 th:text="${record.title}">Album Title</h1>
        <p class="hero-text">
            Open the full information for this record, then edit or delete it if needed.
        </p>

        <div class="hero-actions">
            <a th:href="@{/records}" class="btn btn-secondary">Back to Catalog</a>
            <a th:href="@{'/records/' + ${record.id} + '/edit'}" class="btn btn-secondary">Edit Record</a>

            <form th:action="@{'/records/' + ${record.id} + '/delete'}"
                  method="post"
                  class="inline-form"
                  onsubmit="return confirm('Are you sure you want to delete this record?');">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                <button type="submit" class="btn btn-danger">Delete Record</button>
            </form>
        </div>
    </header>

    <section class="details-section">
        <div class="details-card">
            <div class="details-grid">
                <div class="details-cover">
                    <img th:src="${record.coverImagePath}" alt="Cover image">
                </div>

                <div class="details-content">
                    <h2 th:text="${record.artist}">Artist</h2>

                    <div class="record-tags details-tags">
                        <span class="tag" th:if="${record.collectionSection.name() == 'IN_MY_COLLECTION'}">
                            My Collection
                        </span>
                        <span class="tag" th:if="${record.collectionSection.name() == 'WISHLIST'}">
                            Wishlist
                        </span>

                        <span class="tag" th:text="${record.genre}">Genre</span>

                        <span class="tag" th:if="${record.vinylFormat != null}" th:text="${record.vinylFormat}">
                            LP
                        </span>
                    </div>

                    <div class="details-list">
                        <div class="details-row">
                            <span class="details-label">Album Title</span>
                            <span class="details-value" th:text="${record.title}">Album Title</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label">Artist</span>
                            <span class="details-value" th:text="${record.artist}">Artist</span>
                        </div>

                        <div class="details-row">
                            <span class="details-label">Genre</span>
                            <span class="details-value" th:text="${record.genre}">Genre</span>
                        </div>

                        <div class="details-row" th:if="${record.releaseYear != null}">
                            <span class="details-label">Release Year</span>
                            <span class="details-value" th:text="${record.releaseYear}">2020</span>
                        </div>

                        <div class="details-row" th:if="${record.labelName != null and !#strings.isEmpty(record.labelName)}">
                            <span class="details-label">Label</span>
                            <span class="details-value" th:text="${record.labelName}">Label</span>
                        </div>

                        <div class="details-row" th:if="${record.notes != null and !#strings.isEmpty(record.notes)}">
                            <span class="details-label">Notes</span>
                            <span class="details-value details-notes" th:text="${record.notes}">Notes</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>
</div>
</body>
</html>
