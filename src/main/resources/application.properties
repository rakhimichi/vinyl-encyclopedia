spring.application.name=vinylencyclopedia

server.port=${PORT:8080}

# On Heroku, the Java buildpack provides JDBC_DATABASE_URL for Java apps.
# Locally, the fallback URL keeps development simple with your local PostgreSQL.
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/vinyldb?user=rakhimichi&password=}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.thymeleaf.cache=false
spring.jpa.open-in-view=true
